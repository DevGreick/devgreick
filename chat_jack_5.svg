<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" width="100%" height="100%">
  <style>
    @keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
    @keyframes dotsLife{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:0}}
    @keyframes msgAppear{from{opacity:0}to{opacity:1}}
    .dot{fill:#8696A0}.da{animation:blink .8s infinite 0s}.db{animation:blink .8s infinite .2s}.dc{animation:blink .8s infinite .4s}
    .td1{opacity:0;animation:dotsLife 2s ease forwards;animation-delay:.3s}
    .td2{opacity:0;animation:dotsLife 2s ease forwards;animation-delay:4.3s}
    .td3{opacity:0;animation:dotsLife 2.5s ease forwards;animation-delay:8.8s}
    .td4{opacity:0;animation:dotsLife 2s ease forwards;animation-delay:14s}
  </style>

  <!-- Typing dots row 1 -->
  <g class="td1">
    <rect x="16" y="12" rx="10" ry="10" width="64" height="34" fill="#1F2C34"/>
    <circle cx="33" cy="29" r="3.5" class="dot da"/><circle cx="44" cy="29" r="3.5" class="dot db"/><circle cx="55" cy="29" r="3.5" class="dot dc"/>
  </g>
  <!-- Typing dots row 2 -->
  <g class="td2">
    <rect x="16" y="72" rx="10" ry="10" width="64" height="34" fill="#1F2C34"/>
    <circle cx="33" cy="89" r="3.5" class="dot da"/><circle cx="44" cy="89" r="3.5" class="dot db"/><circle cx="55" cy="89" r="3.5" class="dot dc"/>
  </g>
  <!-- Typing dots row 3 -->
  <g class="td3">
    <rect x="16" y="132" rx="10" ry="10" width="64" height="34" fill="#1F2C34"/>
    <circle cx="33" cy="149" r="3.5" class="dot da"/><circle cx="44" cy="149" r="3.5" class="dot db"/><circle cx="55" cy="149" r="3.5" class="dot dc"/>
  </g>
  <!-- Typing dots row 4 -->
  <g class="td4">
    <rect x="16" y="192" rx="10" ry="10" width="64" height="34" fill="#1F2C34"/>
    <circle cx="33" cy="209" r="3.5" class="dot da"/><circle cx="44" cy="209" r="3.5" class="dot db"/><circle cx="55" cy="209" r="3.5" class="dot dc"/>
  </g>

  <foreignObject x="0" y="0" width="520" height="280">
    <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;align-items:flex-start;gap:16px;padding:8px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

      <div class="bbl" style="background:#005C4B;color:#E9EDEF;font-size:14.5px;padding:10px 14px;border-radius:10px;display:inline-flex;align-items:baseline;gap:8px;opacity:0;animation:msgAppear .2s ease forwards;animation-delay:2.4s;">
        <span>Oi, eu sou o Devgreick 😄</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="11" viewBox="0 0 16 11" style="flex-shrink:0;margin-top:2px;">
          <polyline points="1,5 4,8 10,2" stroke="#53BDEB" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="5,5 8,8 14,2" stroke="#53BDEB" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="bbl" style="background:#005C4B;color:#E9EDEF;font-size:14.5px;padding:10px 14px;border-radius:10px;display:inline-flex;align-items:baseline;gap:8px;opacity:0;animation:msgAppear .2s ease forwards;animation-delay:6.4s;">
        <span>Cybersecurity Analyst na NTT 🔒</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="11" viewBox="0 0 16 11" style="flex-shrink:0;margin-top:2px;">
          <polyline points="1,5 4,8 10,2" stroke="#53BDEB" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="5,5 8,8 14,2" stroke="#53BDEB" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="bbl" style="background:#005C4B;color:#E9EDEF;font-size:14.5px;padding:10px 14px;border-radius:10px;display:inline-flex;align-items:baseline;gap:8px;opacity:0;animation:msgAppear .2s ease forwards;animation-delay:11.4s;">
        <span>LPIC-1 | NSE 4 | Google Cloud ACE 🏅</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="11" viewBox="0 0 16 11" style="flex-shrink:0;margin-top:2px;">
          <polyline points="1,5 4,8 10,2" stroke="#53BDEB" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="5,5 8,8 14,2" stroke="#53BDEB" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="bbl" style="background:#005C4B;color:#E9EDEF;font-size:14.5px;padding:10px 14px;border-radius:10px;display:inline-flex;align-items:baseline;gap:8px;opacity:0;animation:msgAppear .2s ease forwards;animation-delay:16.1s;">
        <span>Rola pra baixo e vê o que eu construo 👇</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="11" viewBox="0 0 16 11" style="flex-shrink:0;margin-top:2px;">
          <polyline points="1,5 4,8 10,2" stroke="#53BDEB" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="5,5 8,8 14,2" stroke="#53BDEB" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

    </div>
  </foreignObject>
</svg>
